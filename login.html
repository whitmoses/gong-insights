<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gong Insights — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.10);
      padding: 2.75rem 2.25rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-logo {
      font-size: 1.9rem;
      font-weight: 700;
      color: #0D6EFD;
      letter-spacing: -1px;
      margin-bottom: 0.2rem;
    }
    .login-subtitle {
      color: #6c757d;
      font-size: 0.88rem;
      margin-bottom: 2.25rem;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 0.65rem 1rem;
      background: #fff;
      border: 1.5px solid #dadce0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #3c4043;
      text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-google:hover {
      background: #f8f9fa;
      box-shadow: 0 1px 6px rgba(60,64,67,0.15);
      color: #3c4043;
    }
    .google-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .divider {
      border-top: 1px solid #e9ecef;
      margin: 2rem 0 1.25rem;
    }
    .access-note {
      font-size: 0.78rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🔍 Gong Insights</div>
    <div class="login-subtitle">Tonic.ai · Customer Intelligence</div>

    <a href="/auth/google" class="btn-google">
      <svg class="google-icon" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </a>

    <div class="divider"></div>
    <div class="access-note">Access restricted to @tonic.ai accounts</div>
  </div>
</body>
</html>
