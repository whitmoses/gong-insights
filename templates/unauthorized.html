<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access Denied</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 4px 28px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      max-width: 400px;
      text-align: center;
    }
    .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .email-badge {
      background: #f1f5f9;
      border-radius: 6px;
      padding: 4px 10px;
      font-family: monospace;
      font-size: 0.9rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h5 class="fw-bold mb-2">Access Denied</h5>
    <p class="text-muted mb-3" style="font-size:0.9rem;">
      <span class="email-badge">{{ email }}</span><br><br>
      This app is restricted to <strong>@tonic.ai</strong> accounts.<br>
      Please sign in with your Tonic work email.
    </p>
    <a href="/login" class="btn btn-primary btn-sm">Try a different account</a>
  </div>
</body>
</html>
